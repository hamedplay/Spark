[build]
publish = "dist"
command = "npx vite build"

[[headers]]
for = "/*"

[headers.values]
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
X-Frame-Options = "DENY"
Strict-Transport-Security = "max-age=31536000; includeSubDomains"
Permissions-Policy = "camera=(self), microphone=(self), display-capture=(self), fullscreen=(self)"
Content-Security-Policy-Report-Only = "default-src 'none'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://images.pexels.com https://zjmozuivykubdqnizhob.supabase.co https://api.shahrmeeting.ir; font-src 'self'; connect-src 'self' https://zjmozuivykubdqnizhob.supabase.co wss://zjmozuivykubdqnizhob.supabase.co https://api.ipify.org https://accounts.google.com https://api.groq.com https://api.openai.com; frame-src https://accounts.google.com; media-src 'self' blob:; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; manifest-src 'self'; report-uri https://zjmozuivykubdqnizhob.supabase.co/functions/v1/csp-report"